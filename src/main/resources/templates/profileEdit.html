<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Edit Profile — Alpha Solutions</title>
    <link rel="stylesheet" th:href="@{/styles.css}"/>
    <link rel="stylesheet" th:href="@{/profile.css}"/>
</head>
<body>

<header>
    <div class="logo">Alpha Solutions</div>
    <nav>
        <ul>
            <li><a th:href="@{/projects}">My Projects</a></li>
            <li><a th:href="@{/user/logout}">Log out</a></li>
        </ul>
    </nav>
</header>

<main>
    <section class="container">

        <h2>Edit Profile</h2>

        <div class="card profile-card">

            <form th:action="@{/profile/update}" method="post">

                <input type="hidden" name="userId" th:value="${user.userId}">

                <p>
                    <label for="userName"><strong>Name</strong></label>
                    <input type="text" id="userName" name="userName"
                           th:value="${user.userName}" required/>
                </p>

                <p>
                    <label for="userUsername"><strong>Username</strong></label>
                    <input type="text" id="userUsername" name="userUsername"
                           th:value="${user.userUsername}" required/>
                </p>

                <p>
                    <label for="userPassword"><strong>New password</strong></label>
                    <input type="password" id="userPassword" name="userPassword"
                           placeholder="Leave blank to keep current"/>
                </p>

                <div class="btn-row">
                    <button type="submit" class="btn">Save changes</button>
                    <a th:href="@{/profile/view}" class="btn btn-outline">Cancel</a>
                </div>
            </form>

        </div>

    </section>
</main>

</body>
</html>
