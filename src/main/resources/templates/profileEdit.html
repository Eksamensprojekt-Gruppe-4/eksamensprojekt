<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Edit Profile — Alpha Solutions</title>
    <link rel="stylesheet" th:href="@{/styles.css}"/>
    <link rel="stylesheet" th:href="@{/forms.css}"/>
</head>
<body>

<header>
    <div class="logo">Alpha Solutions</div>
    <nav>
        <ul>
            <li><a th:href="@{/projects/myProjects}">My Projects</a></li>
            <li><a th:href="@{/projects/allProjects}">All Projects</a></li>
            <li><a th:href="@{/profile/view}">Profile</a></li>
            <li><a th:href="@{/profile/logout}">Log out</a></li>
        </ul>
    </nav>
</header>

<main>
    <div class="form-card">

        <h2>Edit Profile</h2>
        <p class="form-subtitle">Update your name, username, or password</p>

        <form th:action="@{/profile/update}" method="post">

            <input type="hidden" name="userId" th:value="${user.userId}"/>

            <div class="field">
                <label for="userName">Name</label>
                <input type="text" id="userName" name="userName"
                       th:value="${user.userName}" required/>
            </div>

            <div class="field">
                <label for="userUsername">Username</label>
                <input type="text" id="userUsername" name="userUsername"
                       th:value="${user.userUsername}" required/>
            </div>

            <hr class="form-divider"/>

            <div class="field">
                <label for="userPassword">New password</label>
                <input type="password" id="userPassword" name="userPassword"
                       placeholder="Leave blank to keep current"/>
            </div>

            <div class="form-actions-2">
                <button type="submit" class="btn">Save changes</button>
                <a th:href="@{/profile/view}" class="btn btn-outline">Cancel</a>
            </div>

        </form>

    </div>
</main>

</body>
</html>
