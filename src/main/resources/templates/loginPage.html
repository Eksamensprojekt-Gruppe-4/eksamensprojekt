<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Alpha Solutions - Login</title>
    <link rel="stylesheet" th:href="@{/styles.css}"/>
    <link rel="stylesheet" th:href="@{/login.css}"/>
</head>
<body>
<header>
    <div class="logo">Alpha Solutions</div>
</header>
<main>
    <div class="login-card">
        <form th:action="@{/profile/authenticateLogin}" method="post" class="login-form">

            <span class="field-label">Your details</span>

            <input type="text" name="managerUsername" placeholder="Username" required autocomplete="on"/>
            <input type="password" name="managerPassword" placeholder="Password" required autocomplete="current-password"/>

            <div class="login-actions">
                <button type="submit" class="btn">
                    Log in
                </button>
            </div>
        </form>
    </div>
</main>
</body>
</html>
