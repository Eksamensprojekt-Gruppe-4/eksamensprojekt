<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Create Sub-project — Alpha Solutions</title>
    <link rel="stylesheet" th:href="@{/styles.css}"/>
    <link rel="stylesheet" th:href="@{/forms.css}"/>
</head>
<body>

<header>
    <div class="logo">Alpha Solutions</div>
    <nav>
        <ul>
            <li><a th:href="@{/projects/myProjects}">My Projects</a></li>
            <li><a th:href="@{/projects/allProjects}">All Projects</a></li>
            <li><a th:href="@{/profile/view}">Profile</a></li>
            <li><a th:href="@{/profile/logout}">Log out</a></li>
        </ul>
    </nav>
</header>

<main>
    <div class="form-card">

        <h2>Create sub-project</h2>
        <p class="form-subtitle" th:text="'Part of project #' + ${projectId}">Part of project #1</p>

        <form th:action="@{/projects/{id}/subprojects(id=${projectId})}" method="post">

            <div class="field">
                <label for="subProjectName">Name</label>
                <input type="text" id="subProjectName" name="subProjectName"
                       placeholder="Enter sub-project name"
                       maxlength="50" pattern=".*\S.*"
                       title="Sub-project name cannot be only spaces" required/>
            </div>

            <div class="field">
                <label for="subProjectDescription">Description</label>
                <textarea id="subProjectDescription" name="subProjectDescription"
                          placeholder="What does this sub-project cover?"
                          maxlength="400"
                ></textarea>
            </div>

            <div class="form-actions-2">
                <button type="submit" class="btn">Create sub-project</button>
                <a th:href="@{/projects/{id}(id=${projectId})}" class="btn btn-outline">Cancel</a>
            </div>

        </form>
    </div>
</main>

</body>
</html>
