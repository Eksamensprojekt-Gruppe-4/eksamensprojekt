<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Add Task — Alpha Solutions</title>
    <link rel="stylesheet" th:href="@{/styles.css}"/>
    <link rel="stylesheet" th:href="@{/forms.css}"/>
</head>
<body>

<header>
    <div class="logo">Alpha Solutions</div>
    <nav>
        <ul>
            <li><a th:href="@{/projects/myProjects}">My Projects</a></li>
            <li><a th:href="@{/projects/allProjects}">All Projects</a></li>
            <li><a th:href="@{/profile/view}">Profile</a></li>
            <li><a th:href="@{/profile/logout}">Log out</a></li>
        </ul>
    </nav>
</header>

<main>
    <div class="form-card">

        <h2>Add task</h2>
        <p class="form-subtitle" th:text="'Adding to: ' + ${subProject.subProjectName}">Adding to: Sub-project name</p>

        <form th:action="@{/projects/{projectId}/subprojects/{subProjectId}/task/add(projectId=${projectId},subProjectId=${subProject.subProjectId})}" method="post">

            <input type="hidden" name="subProjectId" th:value="${subProject.subProjectId}"/>

            <div class="field">
                <label for="taskName">Task name</label>
                <input type="text" id="taskName" name="taskName" placeholder="Enter task name" required/>
            </div>

            <div class="field">
                <label for="taskDescription">Description</label>
                <textarea id="taskDescription" name="taskDescription" placeholder="What needs to be done?"></textarea>
            </div>

            <div class="field">
                <label for="taskEstimatedHours">Estimated hours</label>
                <input type="number" id="taskEstimatedHours" name="taskEstimatedHours" placeholder="0.0" min="0" step="0.5"/>
            </div>

            <hr class="form-divider"/>

            <div class="field">
                <label for="userId">Assign to</label>
                <select id="userId" name="userId" required>
                    <option value="">— Select a user —</option>
                    <option th:each="user : ${users}"
                            th:value="${user.userId}"
                            th:text="${user.userName} + ' (' + ${user.userUsername} + ')'">
                    </option>
                </select>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn">Create task</button>
                <a th:href="@{/projects/{projectId}/subprojects/{subProjectId}/(projectId=${projectId},subProjectId=${subProject.subProjectId})}"
                   class="btn btn-outline">Cancel</a>
            </div>

        </form>
    </div>
</main>

</body>
</html>
