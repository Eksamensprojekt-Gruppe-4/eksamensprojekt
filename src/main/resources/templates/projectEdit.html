<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Edit Project — Alpha Solutions</title>
    <link rel="stylesheet" th:href="@{/styles.css}"/>
    <link rel="stylesheet" th:href="@{/forms.css}"/>
</head>
<body>

<header>
    <div class="logo">Alpha Solutions</div>
    <nav>
        <ul>
            <li><a th:href="@{/projects/myProjects}">My Projects</a></li>
            <li><a th:href="@{/projects/allProjects}">All Projects</a></li>
            <li><a th:href="@{/profile/view}">Profile</a></li>
            <li><a th:href="@{/profile/logout}">Log out</a></li>
        </ul>
    </nav>
</header>

<main>
    <div class="form-card">

        <h2>Edit Project</h2>
        <p class="form-subtitle" th:text="'Editing: ' + ${project.projectName}"></p>

        <form th:action="@{/projects/edit/{id}(id=${project.projectId})}" method="post">
            <p class="error" th:if="${error}" th:text="${error}"></p>
            <div class="field">
                <label for="projectName">Project name</label>
                <input type="text" id="projectName" name="projectName"
                       th:value="${project.projectName}" required/>
            </div>

            <div class="field">
                <label for="projectDescription">Description</label>
                <textarea id="projectDescription" name="projectDescription"
                          th:text="${project.projectDescription}"></textarea>
            </div>

            <div class="field">
                <label for="projectStartDate">Start date</label>
                <input type="date" id="projectStartDate" name="projectStartDate"
                       th:value="${project.projectStartDate}" th:min="${today}" required/>
            </div>

            <hr class="form-divider"/>

            <div class="field">
                <label>Assign users</label>
                <div class="user-selection-box">
                    <div th:each="user : ${allUsers}" class="user-item">
                        <label>
                            <input type="checkbox"
                                   name="listOfUserIdsFromAssignedUsers"
                                   th:value="${user.userId}"
                                   th:checked="${assignedUsersIds.contains(user.userId)}">
                            <span th:text="${user.userName}"></span>
                        </label>
                    </div>
                </div>
            </div>

            <div class="form-actions-2">
                <button type="submit" class="btn">Save changes</button>
                <a th:href="@{/projects/{id}(id=${project.projectId})}" class="btn btn-outline">Cancel</a>
            </div>

        </form>
    </div>
</main>

</body>
</html>
