<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>My Projects — Alpha Solutions</title>
    <link rel="stylesheet" th:href="@{/styles.css}"/>
    <link rel="stylesheet" th:href="@{/projects.css}"/>
</head>
<body>

<header>
    <div class="logo">Alpha Solutions</div>
    <nav>
        <ul>
            <li><a th:href="@{/project/myProjects}" class="active">My projects</a></li>
            <li><a th:href="@{/projects}">All projects</a></li>
        </ul>
        <a th:href="@{/profile/logout}" class="btn">Log out</a>
    </nav>
</header>

<main>
    <section class="container">

        <div class="page-header">
            <h2>My projects:</h2>
            <button class="sort-btn">
                Sort by
                <svg viewBox="0 0 10 6" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M1 1L5 5L9 1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>

        <div th:if="${projects != null and !projects.isEmpty()}">
            <table class="projects-table">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Project name</th>
                    <th>Created date</th>
                    <th>Deadline</th>
                    <th></th>
                    <th></th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="project : ${projects}">
                    <td>
                        <span class="project-id-badge" th:text="${project.projectId}">1</span>
                    </td>
                    <td>
                        <span class="project-name" th:text="${project.projectName}">Project name</span>
                    </td>
                    <td>
                        <span class="project-date" th:text="${project.projectStartDate}">2025-01-01</span>
                    </td>
                    <td>
                            <span class="deadline-badge none"
                                  th:if="${project.projectEstimatedDeadline == null}">No deadline</span>
                        <span class="deadline-badge ok"
                              th:if="${project.projectEstimatedDeadline != null}"
                              th:text="${project.projectEstimatedDeadline}">2025-06-30</span>
                    </td>
                    <td>
                        <a href="#" class="btn-sm btn-view">View</a>
                    </td>
                    <td>
                        <a href="#" class="btn-sm btn-edit">Edit</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="empty-state" th:if="${projects == null or projects.isEmpty()}">
            <p>You don't have any projects yet.</p>
            <a th:href="@{/project/add}" class="btn">Create your first project</a>
        </div>

    </section>
</main>

</body>
</html>
